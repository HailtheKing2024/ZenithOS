name: ZenithOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workstation-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 bash

      - name: Run workstation-check
        run: |
          cd OS
          python3 tools/check_workstation.py

  runtime-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash

      - name: Run runtime-check
        run: |
          cd OS
          bash workstation/qa/runtime-check.sh
